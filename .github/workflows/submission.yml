name: Evaluate submission

# Triggered when an issue is labeled `submission` (the issue template
# applies the label automatically on creation). The job parses the issue
# body, fetches the user's .lean file, copies it into a fresh checkout
# of utkuokur/lean-challenge, runs `lake build` against the pinned
# toolchain, and on success appends an entry to site-data/leaderboard.json.

on:
  issues:
    # `opened` is the load-bearing trigger — it fires automatically
    # when a user submits the issue form, no label required. `labeled`
    # is kept so a maintainer can manually re-fire evaluation by
    # toggling the `submission` label off and on (useful when iterating
    # on the workflow itself). `reopened` lets a closed issue be
    # re-evaluated without filing a brand-new one.
    types: [opened, labeled, reopened]

concurrency:
  # Per-issue group so concurrent submissions don't cancel each other.
  # Two runs on the same issue (e.g. opened + auto-labeled both firing)
  # serialize rather than duplicate.
  group: submission-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  evaluate:
    # Gate on the issue body having either the single-file form's
    # `### Submission URL` section OR the repo form's `### Repository URL`
    # section. This routes both submission templates here and silently
    # ignores ad-hoc off-topic issues. For the `labeled` trigger we ALSO
    # require the label to actually be `submission`, so other labels
    # (`triage`, `wontfix`, ...) don't re-fire the workflow.
    if: |
      github.event.issue.state == 'open'
      && (
        contains(github.event.issue.body, '### Submission URL')
        || contains(github.event.issue.body, '### Repository URL')
      )
      && (
        github.event.action == 'opened'
        || github.event.action == 'reopened'
        || (github.event.action == 'labeled' && github.event.label.name == 'submission')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      # `contents: write` so we can push the updated leaderboard.json back.
      contents: write
      # `issues: write` so we can comment + close the submission issue.
      issues: write
    steps:
      # ───────────────────────────────────────────────────────────────
      # 0. Checkouts
      # ───────────────────────────────────────────────────────────────
      - name: Checkout submissions repo (this repo)
        uses: actions/checkout@v4

      - name: Checkout lean-challenges build environment
        uses: actions/checkout@v4
        with:
          repository: utkuokur/lean-challenges
          ref: main
          path: lean-challenge

      # ───────────────────────────────────────────────────────────────
      # 1. Parse issue body
      #
      # GitHub Issue Forms render each field as a `### Label` section
      # followed by the value. We extract the fields by header and
      # detect which submission template was used (gist vs repo).
      # ───────────────────────────────────────────────────────────────
      - name: Parse issue body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os, re, sys

          body = os.environ.get("ISSUE_BODY", "")

          def extract(label: str, required: bool = True) -> str:
              pat = rf"^###\s+{re.escape(label)}\s*\n+(?P<v>.+?)(?=\n+###\s|\Z)"
              m = re.search(pat, body, re.MULTILINE | re.DOTALL)
              if not m:
                  if required:
                      sys.exit(f"missing required field: {label}")
                  return ""
              return m.group("v").strip()

          # Detect submission mode by which URL field the template emitted.
          # `gist` is the single-file flow (curl one .lean); `repo` is the
          # multi-file flow (shallow git clone, splice Submission/ dir).
          if "### Repository URL" in body:
              mode = "repo"
              source_url = ""
              repo_url = extract("Repository URL")
              repo_ref = extract("Git ref", required=False) or "main"
          elif "### Submission URL" in body:
              mode = "gist"
              source_url = extract("Submission URL")
              repo_url = ""
              repo_ref = ""
          else:
              sys.exit("issue body has neither '### Submission URL' "
                       "nor '### Repository URL' — was it filed via the "
                       "submission template?")

          problem_raw = extract("Problem")
          claim = extract("Claim")
          parameter = extract("Chosen parameter r")
          nickname = extract("Nickname")
          name = extract("Full name (optional)", required=False)
          production = extract("How this proof was produced (optional)",
                               required=False)

          # The dropdown stores the bare id (challenge_N or challenge_N_univ).
          # `.split()[0]` is defensive in case we later add display text.
          problem_id = problem_raw.split()[0].strip()

          # Map problem_id -> on-disk module name. Problem ids use 1-digit
          # numbering (challenge_1); on-disk files use 2-digit zero-padded
          # numbering (challenge_01.lean). The `_disprove` suffix is only
          # valid after `_univ` (only universal problems have a disprove
          # direction in the canonical set).
          m = re.match(r"^challenge_(\d+)(_univ(?:_disprove)?)?$", problem_id)
          if not m:
              sys.exit(f"unrecognized problem id: {problem_id!r}")
          n = int(m.group(1))
          suffix = m.group(2) or ""
          module = f"challenge_{n:02d}{suffix}"

          # Normalize "_No response_" (GitHub Issue Forms placeholder
          # for empty optional fields) to actual empty string.
          if name in ("", "_No response_"):
              name = ""
          if production in ("", "_No response_"):
              production = ""

          # Strip newlines from single-line fields so GITHUB_OUTPUT
          # multiline syntax isn't needed for them.
          single = {"mode": mode,
                    "source_url": source_url,
                    "repo_url": repo_url, "repo_ref": repo_ref,
                    "problem_id": problem_id,
                    "module": module, "claim": claim,
                    "parameter": parameter, "nickname": nickname,
                    "name": name}
          for k, v in single.items():
              v_one = v.replace("\n", " ").replace("\r", "").strip()
              print(f"{k}={v_one}")

          # production_description can contain newlines; use heredoc.
          print("production_description<<__EOF__")
          print(production)
          print("__EOF__")
          PY

      # ───────────────────────────────────────────────────────────────
      # 1b. Reject duplicate (problem, r) submissions
      #
      # Once any user lands an accepted entry for a given (problem, r)
      # pair, the question is mathematically settled — both prove and
      # disprove directions are decided. We block any later submission
      # against the same pair, regardless of claim, regardless of mode
      # (gist or repo). For universal challenges `parameter` is the
      # literal string "universal", so the same rule blocks duplicate
      # universal submissions automatically.
      #
      # No race-handling: two submissions for the same r in flight at
      # the same time can both pass this check and both end up on the
      # leaderboard. That's intentional — joint credit if you tie.
      # ───────────────────────────────────────────────────────────────
      - name: Reject duplicate (problem, r)
        env:
          PROBLEM_ID: ${{ steps.parse.outputs.problem_id }}
          PARAMETER: ${{ steps.parse.outputs.parameter }}
        run: |
          DUPE=$(python3 - <<'PY'
          import json, os, pathlib, sys
          p = pathlib.Path("site-data/leaderboard.json")
          if not p.exists() or p.stat().st_size == 0:
              sys.exit(0)
          data = json.loads(p.read_text(encoding="utf-8"))
          problem_id = os.environ["PROBLEM_ID"]
          parameter = os.environ["PARAMETER"]
          for e in data.get("entries", []):
              if e.get("problem") == problem_id \
                 and e.get("parameter") == parameter:
                  print(f"issue #{e.get('issue', '?')} by "
                        f"{e.get('nickname', '?')}")
                  break
          PY
          )
          if [ -n "$DUPE" ]; then
            echo "FETCH_ERROR=Challenge \`$PROBLEM_ID\` at r = \`$PARAMETER\` has already been settled ($DUPE). Pick a different r." >> "$GITHUB_ENV"
            exit 1
          fi

      # ───────────────────────────────────────────────────────────────
      # 2a. Fetch the user's .lean file (gist mode only)
      # ───────────────────────────────────────────────────────────────
      - name: Fetch submitted .lean file
        id: fetch
        if: steps.parse.outputs.mode == 'gist'
        env:
          URL: ${{ steps.parse.outputs.source_url }}
        run: |
          set -e
          if ! curl -fsSL --max-time 30 --max-filesize 1048576 \
              -H "Accept: text/plain" "$URL" -o /tmp/submission.lean; then
            echo "FETCH_ERROR=Could not fetch the submission URL." >> "$GITHUB_ENV"
            exit 1
          fi
          # Strip Lean comments before content checks. Otherwise a benign
          # comment like `-- proof avoids sorry by ...` would be rejected.
          # Handles `-- line comments` and `/- block comments -/`. Nested
          # block comments are not handled; in practice users do not nest.
          python3 - <<'PY' > /tmp/submission-stripped.lean
          import re
          src = open('/tmp/submission.lean').read()
          # Remove /- ... -/ block comments (non-greedy).
          src = re.sub(r'/-[\s\S]*?-/', '', src)
          # Remove -- line comments (everything up to end-of-line).
          src = re.sub(r'--[^\n]*', '', src)
          import sys; sys.stdout.write(src)
          PY
          # Reject `sorry`-containing proofs early (fast fail without
          # invoking lake). Operates on the comment-stripped copy.
          if grep -nE '(^|[^[:alnum:]_])sorry([^[:alnum:]_]|$)' /tmp/submission-stripped.lean; then
            echo "FETCH_ERROR=Submission contains \`sorry\`. All proofs must be complete." >> "$GITHUB_ENV"
            exit 1
          fi
          # Reject `axiom` declarations. The only axioms permitted in a
          # submission are the foundational ones Mathlib already uses
          # (propext, Classical.choice, Quot.sound); these come in
          # transitively via imports and are not declared in the user's
          # file. A user-introduced `axiom foo : <signature>` would
          # otherwise let them "prove" anything by assertion.
          # Matches both `axiom foo : ...` and `noncomputable axiom foo : ...`
          # at the start of a logical line.
          if grep -nE '^[[:space:]]*(noncomputable[[:space:]]+)?axiom[[:space:]]' /tmp/submission-stripped.lean; then
            echo "FETCH_ERROR=Submission contains an \`axiom\` declaration. Only Mathlib's foundational axioms (propext, Classical.choice, Quot.sound) are permitted; you cannot introduce new ones." >> "$GITHUB_ENV"
            exit 1
          fi
          echo "Fetched $(wc -c < /tmp/submission.lean) bytes."

      # ───────────────────────────────────────────────────────────────
      # 2b. Shallow-clone the user's repo (repo mode only)
      #
      # Mirrors the gist flow's safety checks but over an entire
      # `Submission/` directory rather than a single file:
      #   - validate `Submission/Main.lean` exists (the convention),
      #   - strip comments and grep every `.lean` for `sorry` / `axiom`,
      #   - copy `Submission/` into the canonical checkout,
      #   - register a `Submission` lib in lean-challenge/lakefile.toml so
      #     Lake builds the user's files alongside the canonical Challenges
      #     lib.
      # ───────────────────────────────────────────────────────────────
      - name: Clone submission repo
        id: clone
        if: steps.parse.outputs.mode == 'repo'
        env:
          URL: ${{ steps.parse.outputs.repo_url }}
          REF: ${{ steps.parse.outputs.repo_ref }}
        run: |
          set -e
          if ! git clone --depth 1 --branch "$REF" "$URL" /tmp/user-repo; then
            echo "FETCH_ERROR=Could not clone \`$URL\` at ref \`$REF\`. Make sure the repo is public and the ref exists." >> "$GITHUB_ENV"
            exit 1
          fi
          if [ ! -f /tmp/user-repo/Submission/Main.lean ]; then
            echo "FETCH_ERROR=Repository must contain \`Submission/Main.lean\` at the root. See the repo submission template for the expected layout." >> "$GITHUB_ENV"
            exit 1
          fi
          # Run the same content checks as the gist flow, over every .lean
          # file under Submission/. Each file gets its own stripped copy.
          while IFS= read -r f; do
            python3 - "$f" > /tmp/stripped.lean <<'PY'
          import re, sys
          src = open(sys.argv[1]).read()
          src = re.sub(r'/-[\s\S]*?-/', '', src)
          src = re.sub(r'--[^\n]*', '', src)
          sys.stdout.write(src)
          PY
            if grep -nE '(^|[^[:alnum:]_])sorry([^[:alnum:]_]|$)' /tmp/stripped.lean; then
              rel="${f#/tmp/user-repo/}"
              echo "FETCH_ERROR=\`$rel\` contains \`sorry\`. All proofs must be complete." >> "$GITHUB_ENV"
              exit 1
            fi
            if grep -nE '^[[:space:]]*(noncomputable[[:space:]]+)?axiom[[:space:]]' /tmp/stripped.lean; then
              rel="${f#/tmp/user-repo/}"
              echo "FETCH_ERROR=\`$rel\` declares an \`axiom\`. Only Mathlib's foundational axioms (propext, Classical.choice, Quot.sound) are permitted; you cannot introduce new ones." >> "$GITHUB_ENV"
              exit 1
            fi
          done < <(find /tmp/user-repo/Submission -type f -name '*.lean')
          # Splice the user's Submission/ into the canonical checkout as a
          # sibling Lake lib of `Challenges`. The user's `import Submission.X`
          # statements resolve identically here and in their local checkout.
          cp -r /tmp/user-repo/Submission lean-challenge/Submission
          cat >> lean-challenge/lakefile.toml <<'TOML'

[[lean_lib]]
name = "Submission"
TOML
          echo "Spliced $(find lean-challenge/Submission -name '*.lean' | wc -l) Lean file(s) into canonical checkout from $URL@$REF."

      # ───────────────────────────────────────────────────────────────
      # 3. Install elan + Lean toolchain
      # ───────────────────────────────────────────────────────────────
      - name: Install elan
        run: |
          set -e
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -o /tmp/elan-init.sh
          sh /tmp/elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # ───────────────────────────────────────────────────────────────
      # 4. Wrap submission in a Submission namespace and generate the
      #    signature-shim check file, then build the check (NOT the
      #    user's file directly). This is the load-bearing step: if
      #    the user's theorem signature does not match the canonical
      #    one in Challenges/challenge_NN.lean (with `r` substituted
      #    by Submission.r), `lake build Challenges.Check` fails to
      #    typecheck.
      #
      #    Repo-mode submissions skip the wrap step — the user already
      #    namespaces their own code and we copy `Submission/` directly
      #    into the canonical checkout. Only gist mode needs the
      #    auto-wrap.
      # ───────────────────────────────────────────────────────────────
      - name: Wrap submission into Challenges/Submission.lean
        if: steps.parse.outputs.mode == 'gist'
        run: |
          MODULE="${{ steps.parse.outputs.module }}"
          # The wrapper:
          # 1. Imports the canonical so the user has access to its
          #    helper structures (Minor, hadwigerNumber, etc.).
          # 2. Hoists the user's own imports to file-top (Lean requires
          #    all imports before any other content).
          # 3. Puts everything else inside `namespace Submission` so
          #    the user's `def r` and `theorem challenge_N` are at
          #    `Submission.r` / `Submission.challenge_N`, distinct
          #    from the canonical's defs at root.
          {
            echo "-- CI-generated wrapper for the submission."
            echo "import Challenges.${MODULE}"
            grep -E '^[[:space:]]*import[[:space:]]+' /tmp/submission.lean || true
            echo ""
            echo "namespace Submission"
            echo ""
            grep -v -E '^[[:space:]]*import[[:space:]]+' /tmp/submission.lean
            echo ""
            echo "end Submission"
          } > "lean-challenge/Challenges/Submission.lean"
          echo "Wrote Submission.lean ($(wc -c < lean-challenge/Challenges/Submission.lean) bytes)"

      - name: Generate signature-shim Check.lean
        run: |
          # Gist flow: the wrap step above wrote `Challenges/Submission.lean`,
          # so Check imports `Challenges.Submission`. Repo flow: the user's
          # files were spliced into the new `Submission` lib at the project
          # root, so Check imports `Submission.Main`.
          SUBMODULE="Challenges.Submission"
          if [ "${{ steps.parse.outputs.mode }}" = "repo" ]; then
            SUBMODULE="Submission.Main"
          fi
          python3 scripts/generate_check.py \
            --problem "${{ steps.parse.outputs.problem_id }}" \
            --output "lean-challenge/Challenges/Check.lean" \
            --submission-module "$SUBMODULE"

      - name: Fetch Mathlib cache
        working-directory: lean-challenge
        # `|| true` so a cache miss doesn't abort the run — lake build
        # will still work, just slowly.
        run: lake exe cache get || true

      - name: Build the signature shim
        id: build
        working-directory: lean-challenge
        # This builds Challenges.Check, which transitively builds
        # Challenges.Submission. Failure here means EITHER the user's
        # proof has a typo / wrong axiom / non-typechecking term, OR
        # the theorem signature does not match the canonical one
        # (the bypass we are guarding against).
        run: |
          set -o pipefail
          lake build Challenges.Check 2>&1 | tee /tmp/build.log

      # ───────────────────────────────────────────────────────────────
      # 5a. Success path: update leaderboard, comment, close issue
      # ───────────────────────────────────────────────────────────────
      - name: Append to leaderboard
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # In gist mode the source URL is the raw .lean URL. In repo mode
          # we compose `<repo>/tree/<ref>` so the leaderboard link points
          # at the user's submitted code at the exact ref CI evaluated.
          if [ "${{ steps.parse.outputs.mode }}" = "repo" ]; then
            SOURCE_URL="${{ steps.parse.outputs.repo_url }}/tree/${{ steps.parse.outputs.repo_ref }}"
          else
            SOURCE_URL="${{ steps.parse.outputs.source_url }}"
          fi
          python3 scripts/append_leaderboard.py \
            --leaderboard site-data/leaderboard.json \
            --nickname "${{ steps.parse.outputs.nickname }}" \
            --name "${{ steps.parse.outputs.name }}" \
            --problem "${{ steps.parse.outputs.problem_id }}" \
            --claim "${{ steps.parse.outputs.claim }}" \
            --parameter "${{ steps.parse.outputs.parameter }}" \
            --issue "${{ github.event.issue.number }}" \
            --source-url "$SOURCE_URL"

          # Commit + push with a small retry loop so concurrent
          # submission runs don't clobber each other.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git add site-data/leaderboard.json
            git commit -m "leaderboard: add issue #${{ github.event.issue.number }}" || true
            if git push; then
              break
            fi
            echo "push attempt ${attempt} failed; pulling rebase and retrying"
            git pull --rebase
            python3 scripts/append_leaderboard.py \
              --leaderboard site-data/leaderboard.json \
              --nickname "${{ steps.parse.outputs.nickname }}" \
              --name "${{ steps.parse.outputs.name }}" \
              --problem "${{ steps.parse.outputs.problem_id }}" \
              --claim "${{ steps.parse.outputs.claim }}" \
              --parameter "${{ steps.parse.outputs.parameter }}" \
              --issue "${{ github.event.issue.number }}" \
              --source-url "$SOURCE_URL"
          done

      - name: Comment success on issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --body "✅ Build succeeded — added to the leaderboard.

          - Problem: \`${{ steps.parse.outputs.problem_id }}\`
          - Claim: ${{ steps.parse.outputs.claim }} for r = ${{ steps.parse.outputs.parameter }}
          - Module built: \`Challenges.${{ steps.parse.outputs.module }}\`"
          gh issue close ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --reason completed

      # ───────────────────────────────────────────────────────────────
      # 5b. Failure path: comment with logs, close issue
      # ───────────────────────────────────────────────────────────────
      - name: Comment failure on issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pick the most specific reason we have evidence for. The
          # FETCH_ERROR env var is set by the fetch / clone step on
          # sorry / axiom / URL failures. Otherwise we sniff the
          # filesystem to see how far the run got before failing.
          # The "did we fetch?" sentinel differs by mode: gist mode
          # writes /tmp/submission.lean; repo mode populates
          # lean-challenge/Submission/.
          LOG_BLOCK=""
          if [ -n "${FETCH_ERROR:-}" ]; then
            REASON="$FETCH_ERROR"
          elif [ ! -d lean-challenge ]; then
            REASON="Could not check out the canonical challenges repository (\`utkuokur/lean-challenges@main\`). It may be private or temporarily unavailable. Please contact the maintainer."
          elif [ "${{ steps.parse.outputs.mode }}" = "gist" ] && [ ! -f /tmp/submission.lean ]; then
            REASON="Setup failed before the submission could be fetched. See workflow logs."
          elif [ "${{ steps.parse.outputs.mode }}" = "repo" ] && [ ! -d lean-challenge/Submission ]; then
            REASON="Setup failed before the submission repo could be cloned. See workflow logs."
          elif [ -f /tmp/build.log ]; then
            REASON="\`lake build\` of the signature shim failed. Most commonly: your theorem's type does not match the canonical \`challenge_N\` signature (substituting your \`Submission.r\` for \`r\`), OR your proof depends on a non-permitted axiom. The tail of the build log is below."
            TAIL=$(tail -c 4000 /tmp/build.log)
            LOG_BLOCK=$'\n\n<details><summary>Build log (tail)</summary>\n\n```\n'"$TAIL"$'\n```\n\n</details>'
          else
            REASON="The evaluation step failed before \`lake build\` started. See workflow logs."
          fi
          BODY="❌ Submission rejected: ${REASON}

          See the workflow run for full logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}${LOG_BLOCK}"
          gh issue comment ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --body "$BODY"
          gh issue close ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --reason "not planned" || true
