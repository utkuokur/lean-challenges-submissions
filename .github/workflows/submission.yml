name: Evaluate submission

# Triggered when a submission issue is opened/labeled/reopened. The
# `evaluate` job parses the issue body, fetches the user's submission
# (a single .lean file at a public raw URL, or a — possibly PRIVATE —
# GitHub repo cloned with the `lean-challenge-bot` App token), runs the
# content checks + `lake build` signature shim against a fresh checkout
# of utkuokur/lean-challenges, and — BEFORE building — encrypts the
# fetched source for the audit archive.
#
# CONFIDENTIALITY MODEL (ported from leanprover/lean-eval-submissions).
# The submission source is never published. Other contestants cannot see
# it; the submitter (it's their repo) and the maintainers (who hold the
# audit-archive private keys, and who can read the private audit repo)
# can. The load-bearing invariants — read SECURITY.md before editing:
#   * fetch + build live in ONE job, so the source never crosses a
#     runner boundary as a downloadable artifact (public-repo artifacts
#     are downloadable by anyone authenticated). Do NOT upload the
#     plaintext source as an artifact, and do NOT split fetch from build.
#   * the `lean-challenge-bot` installation token is scoped to the single
#     `Fetch submission` step's env — never a job-level env/secret.
#   * `persist-credentials: false` on both checkouts + `.git` stripped
#     from both checkouts AND the user clone before `lake build` runs,
#     so no token survives into the (un-sandboxed) Lean elaboration.
#   * the audit ciphertext artifact is safe to upload: it is age-encrypted
#     to .audit/recipients.txt and decryptable only by maintainers.

on:
  issues:
    types: [opened, labeled, reopened]

concurrency:
  group: submission-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  evaluate:
    if: |
      github.event.issue.state == 'open'
      && contains(github.event.issue.body, '### Problem')
      && (
        github.event.action == 'opened'
        || github.event.action == 'reopened'
        || (github.event.action == 'labeled' && github.event.label.name == 'submission')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      # Read only: the leaderboard write happens in the `record` job. This
      # job runs untrusted Lean, so it holds the minimum it needs (issue
      # comments for inline rejections).
      contents: read
      issues: write
    outputs:
      fetch_succeeded: ${{ steps.fetch_status.outputs.succeeded }}
      size_within_cap: ${{ steps.size_status.outputs.within_cap }}
      audit_ciphertext_ready: ${{ steps.audit_status.outputs.ready }}
      build_succeeded: ${{ steps.build.outputs.ok }}
    steps:
      # ───────────────────────────────────────────────────────────────
      # 0. Checkouts (persist-credentials:false on BOTH — see header)
      # ───────────────────────────────────────────────────────────────
      - name: Checkout submissions repo (this repo)
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout lean-challenges build environment
        uses: actions/checkout@v4
        with:
          repository: utkuokur/lean-challenges
          ref: main
          path: lean-challenge
          persist-credentials: false

      # ───────────────────────────────────────────────────────────────
      # 1. Parse issue body  (unchanged from the public pipeline)
      # ───────────────────────────────────────────────────────────────
      - name: Parse issue body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os, re, sys

          body = os.environ.get("ISSUE_BODY", "")

          def extract(label: str, required: bool = True) -> str:
              pat = rf"^###\s+{re.escape(label)}\s*\n+(?P<v>.+?)(?=\n+###\s|\Z)"
              m = re.search(pat, body, re.MULTILINE | re.DOTALL)
              if not m:
                  if required:
                      sys.exit(f"missing required field: {label}")
                  return ""
              return m.group("v").strip()

          def normalize(v: str) -> str:
              return "" if v in ("", "_No response_") else v

          source_url = normalize(extract("Submission URL", required=False))
          repo_url = normalize(extract("Repository URL", required=False))
          if source_url and repo_url:
              sys.exit("Fill exactly one of `Submission URL` or "
                       "`Repository URL`, not both.")
          if not source_url and not repo_url:
              sys.exit("Fill in either `Submission URL` (single .lean) "
                       "or `Repository URL` (multi-file repo).")
          if source_url:
              mode = "gist"
              repo_ref = ""
          else:
              mode = "repo"
              repo_ref = normalize(
                  extract("Git ref", required=False)) or "main"

          parameter_raw = normalize(
              extract("Chosen parameter r", required=False))
          if parameter_raw:
              scope = "specific"
              parameter = parameter_raw
              claim = "prove"
          else:
              scope = "universal"
              parameter = "universal"
              claim = extract("Claim")

          problem_raw = extract("Problem")
          nickname = extract("Nickname")
          name = normalize(
              extract("Full name (optional)", required=False))

          problem_id = problem_raw.split()[0].strip()
          if scope == "universal":
              problem_id = problem_id + (
                  "_univ_disprove" if claim == "disprove" else "_univ")

          m = re.match(r"^challenge_(\d+)(_univ(?:_disprove)?)?$", problem_id)
          if not m:
              sys.exit(f"unrecognized problem id: {problem_id!r}")
          n = int(m.group(1))
          suffix = m.group(2) or ""
          module = f"challenge_{n:02d}{suffix}"

          single = {"mode": mode, "scope": scope,
                    "source_url": source_url,
                    "repo_url": repo_url, "repo_ref": repo_ref,
                    "problem_id": problem_id,
                    "module": module, "claim": claim,
                    "parameter": parameter, "nickname": nickname,
                    "name": name}
          for k, v in single.items():
              v_one = v.replace("\n", " ").replace("\r", "").strip()
              print(f"{k}={v_one}")
          PY

      # ───────────────────────────────────────────────────────────────
      # 1b. Extract owner (repo mode) so we can mint a scoped App token.
      # ───────────────────────────────────────────────────────────────
      - name: Extract submission owner
        id: owner
        if: steps.parse.outputs.mode == 'repo'
        env:
          URL: ${{ steps.parse.outputs.repo_url }}
        run: |
          # owner/repo from https://github.com/<owner>/<repo>[.git][/...]
          OWNER_REPO=$(printf '%s' "$URL" \
            | sed -E 's#^https?://github\.com/([^/]+)/([^/#?]+?)(\.git)?/?$#\1/\2#')
          OWNER=${OWNER_REPO%%/*}
          {
            echo "owner=${OWNER}"
            echo "owner_repo=${OWNER_REPO}"
          } >> "$GITHUB_OUTPUT"

      - name: Mint lean-challenge-bot installation token
        id: app_token
        if: steps.parse.outputs.mode == 'repo'
        uses: actions/create-github-app-token@v1
        # continue-on-error: a public-repo submission whose owner has NOT
        # installed the bot App still clones fine over an anonymous URL.
        # Only a PRIVATE repo without the App truly fails — handled with
        # an instructive message in the Fetch step.
        continue-on-error: true
        with:
          app-id: ${{ secrets.LEAN_CHALLENGE_BOT_APP_ID }}
          private-key: ${{ secrets.LEAN_CHALLENGE_BOT_PRIVATE_KEY }}
          owner: ${{ steps.owner.outputs.owner }}

      # ───────────────────────────────────────────────────────────────
      # 1c. Reject duplicate (problem, r) submissions  (unchanged)
      # ───────────────────────────────────────────────────────────────
      - name: Reject duplicate (problem, r)
        id: dup
        env:
          PROBLEM_ID: ${{ steps.parse.outputs.problem_id }}
          PARAMETER: ${{ steps.parse.outputs.parameter }}
        run: |
          DUPE=$(python3 - <<'PY'
          import json, os, pathlib, sys
          p = pathlib.Path("site-data/leaderboard.json")
          if not p.exists() or p.stat().st_size == 0:
              sys.exit(0)
          data = json.loads(p.read_text(encoding="utf-8"))
          problem_id = os.environ["PROBLEM_ID"]
          parameter = os.environ["PARAMETER"]
          for e in data.get("entries", []):
              if e.get("problem") == problem_id \
                 and e.get("parameter") == parameter:
                  print(f"issue #{e.get('issue', '?')} by "
                        f"{e.get('nickname', '?')}")
                  break
          PY
          )
          if [ -n "$DUPE" ]; then
            echo "FETCH_ERROR=Challenge \`$PROBLEM_ID\` at r = \`$PARAMETER\` has already been settled ($DUPE). Pick a different r." >> "$GITHUB_ENV"
            exit 1
          fi

      # ───────────────────────────────────────────────────────────────
      # 2. Fetch submission. Produces:
      #    /tmp/submission.lean              (gist mode, pre-wrapper file)
      #    lean-challenge/Submission/        (repo mode, spliced lib)
      #    /tmp/fetch-out/source.tar.gz      (the exact evaluated bytes)
      #    /tmp/fetch-out/metadata.json      (record + audit metadata)
      #
      # The App token is referenced ONLY here, step-scoped (see header).
      # ───────────────────────────────────────────────────────────────
      - name: Fetch submission
        id: fetch
        env:
          APP_INSTALLATION_TOKEN: ${{ steps.app_token.outputs.token }}
          MODE: ${{ steps.parse.outputs.mode }}
          SOURCE_URL: ${{ steps.parse.outputs.source_url }}
          REPO_URL: ${{ steps.parse.outputs.repo_url }}
          REPO_REF: ${{ steps.parse.outputs.repo_ref }}
          OWNER_REPO: ${{ steps.owner.outputs.owner_repo }}
          # Passed via env (NOT `${{ }}` interpolation into the script) so
          # free-form, user-controlled fields cannot inject shell/Python.
          ISSUE: ${{ github.event.issue.number }}
          PROBLEM_ID: ${{ steps.parse.outputs.problem_id }}
          PARAMETER: ${{ steps.parse.outputs.parameter }}
          CLAIM: ${{ steps.parse.outputs.claim }}
          NICKNAME: ${{ steps.parse.outputs.nickname }}
          NAME: ${{ steps.parse.outputs.name }}
          MODULE: ${{ steps.parse.outputs.module }}
        run: |
          set -e
          mkdir -p /tmp/fetch-out

          if [ "$MODE" = "gist" ]; then
            # ---- single PUBLIC .lean file ----
            if ! curl -fsSL --max-time 30 --max-filesize 1048576 \
                -H "Accept: text/plain" "$SOURCE_URL" -o /tmp/submission.lean; then
              echo "FETCH_ERROR=Could not fetch the submission URL." >> "$GITHUB_ENV"
              exit 1
            fi
            if ! MSG=$(python3 scripts/content_checks.py /tmp/submission.lean); then
              echo "FETCH_ERROR=${MSG#ERROR: }" >> "$GITHUB_ENV"
              exit 1
            fi
            export SUBMISSION_PUBLIC=true SUBMISSION_KIND=gist SUBMISSION_REPO=gist SUBMISSION_REF=
            # source tarball = the single pre-wrapper file
            tar -czf /tmp/fetch-out/source.tar.gz -C /tmp submission.lean
            echo "Fetched $(wc -c < /tmp/submission.lean) bytes."

          else
            # ---- multi-file repo (may be PRIVATE) ----
            # Is the repo publicly cloneable? (anonymous ls-remote)
            if git ls-remote "$REPO_URL" >/dev/null 2>&1; then
              export SUBMISSION_PUBLIC=true
            else
              export SUBMISSION_PUBLIC=false
            fi
            # Prefer the App token (works for public AND private). Embed it
            # in the clone URL; we strip .git afterwards so it never reaches
            # the Lean elaboration.
            if [ -n "${APP_INSTALLATION_TOKEN:-}" ]; then
              CLONE_URL="https://x-access-token:${APP_INSTALLATION_TOKEN}@github.com/${OWNER_REPO}.git"
            else
              CLONE_URL="$REPO_URL"
            fi
            if ! git clone --depth 1 --branch "$REPO_REF" "$CLONE_URL" /tmp/user-repo 2>/dev/null; then
              if [ "$SUBMISSION_PUBLIC" != "true" ]; then
                echo "FETCH_ERROR=Could not clone the (private) repo \`$REPO_URL\` at ref \`$REPO_REF\`. Install the \`lean-challenge-bot\` GitHub App on it (link in the README) so CI can read it, then re-open this issue." >> "$GITHUB_ENV"
              else
                echo "FETCH_ERROR=Could not clone \`$REPO_URL\` at ref \`$REPO_REF\`. Check the URL and that the ref exists." >> "$GITHUB_ENV"
              fi
              exit 1
            fi
            export SUBMISSION_REF=$(git -C /tmp/user-repo rev-parse HEAD)
            if [ ! -f /tmp/user-repo/Submission/Main.lean ]; then
              echo "FETCH_ERROR=Repository must contain \`Submission/Main.lean\` at the root. See the repo submission template for the expected layout." >> "$GITHUB_ENV"
              exit 1
            fi
            if ! MSG=$(python3 scripts/content_checks.py /tmp/user-repo/Submission); then
              echo "FETCH_ERROR=${MSG#ERROR: }" >> "$GITHUB_ENV"
              exit 1
            fi
            # Splice the user's Submission/ into the canonical checkout as a
            # sibling Lake lib of `Challenges`.
            cp -r /tmp/user-repo/Submission lean-challenge/Submission
            printf '\n[[lean_lib]]\nname = "Submission"\n' >> lean-challenge/lakefile.toml
            # source tarball = the evaluated Submission/ tree
            tar -czf /tmp/fetch-out/source.tar.gz -C lean-challenge Submission
            # Strip the token-bearing clone before any untrusted Lean runs.
            rm -rf /tmp/user-repo/.git
            export SUBMISSION_KIND=github_repo SUBMISSION_REPO="$OWNER_REPO"
            echo "Spliced $(find lean-challenge/Submission -name '*.lean' | wc -l) Lean file(s) from $REPO_URL@$SUBMISSION_REF (public=$SUBMISSION_PUBLIC)."
          fi

          # Frozen metadata for the audit sidecar (encrypt) and the
          # leaderboard (record job). Written by a committed helper that
          # reads env vars and json.dumps them — user-controlled fields are
          # escaped, not injected. source_url is the public link; the record
          # job omits it from the leaderboard for private submissions.
          python3 scripts/write_metadata.py /tmp/fetch-out/metadata.json

      - name: Record fetch status for downstream jobs
        id: fetch_status
        if: always()
        run: |
          if [ "${{ steps.fetch.outcome }}" = "success" ]; then
            echo "succeeded=true" >> "$GITHUB_OUTPUT"
          else
            echo "succeeded=false" >> "$GITHUB_OUTPUT"
          fi

      # ───────────────────────────────────────────────────────────────
      # 3. Audit-archive integration (BEFORE the expensive build, so a
      #    size-cap failure rejects fast). age-encrypt the source tar to
      #    .audit/recipients.txt and upload only the ciphertext + sidecar
      #    (never the plaintext — see header).
      # ───────────────────────────────────────────────────────────────
      - name: Check submission size cap
        id: size_check
        if: steps.fetch.outcome == 'success'
        run: |
          SIZE_BYTES=$(stat -c %s /tmp/fetch-out/source.tar.gz)
          CAP_BYTES=$((10 * 1024 * 1024))
          echo "submission tarball size: ${SIZE_BYTES} bytes (cap: ${CAP_BYTES})"
          if [ "$SIZE_BYTES" -gt "$CAP_BYTES" ]; then
            echo "FETCH_ERROR=Submission rejected: the compressed source tarball is $((SIZE_BYTES/1024)) KiB, over the 10240 KiB (10 MiB) audit-archive cap. Trim build artifacts or large files and resubmit." >> "$GITHUB_ENV"
            exit 1
          fi

      - name: Record size-cap status for downstream jobs
        id: size_status
        if: always()
        run: |
          if [ "${{ steps.size_check.outcome }}" = "success" ]; then
            echo "within_cap=true" >> "$GITHUB_OUTPUT"
          else
            echo "within_cap=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install age (audit encryption)
        if: steps.size_check.outcome == 'success'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq age

      - name: Encrypt submission for audit archive
        id: encrypt
        if: steps.size_check.outcome == 'success'
        run: |
          mkdir -p /tmp/audit-encrypt
          if ! python3 scripts/archive_submission.py encrypt \
              --source-tar /tmp/fetch-out/source.tar.gz \
              --metadata /tmp/fetch-out/metadata.json \
              --recipients .audit/recipients.txt \
              --output-dir /tmp/audit-encrypt; then
            echo "FETCH_ERROR=Audit encryption failed — the submission was not evaluated. This is a maintainer-side configuration issue (likely an empty or invalid \`.audit/recipients.txt\`), not a problem with your proof." >> "$GITHUB_ENV"
            exit 1
          fi

      - name: Upload audit ciphertext artifact
        id: upload_audit
        if: steps.encrypt.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: submission-audit-ciphertext
          path: |
            /tmp/audit-encrypt/source.tar.gz.age
            /tmp/audit-encrypt/sidecar.partial.json
          if-no-files-found: error
          retention-days: 7

      - name: Record audit-ciphertext readiness
        id: audit_status
        if: always()
        run: |
          if [ "${{ steps.encrypt.outcome }}" = "success" ] \
             && [ "${{ steps.upload_audit.outcome }}" = "success" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload submission metadata (for record)
        if: steps.encrypt.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: submission-metadata
          path: /tmp/fetch-out/metadata.json
          if-no-files-found: error
          retention-days: 7

      # ───────────────────────────────────────────────────────────────
      # 4. Strip git state, then run the verifier: wrap → signature-shim
      #    Check.lean → build. The build is SPLIT for the sandbox:
      #      (a) pre-build the trusted env (Mathlib cache + canonical
      #          module) WITH network;
      #      (b) compile the untrusted submission under bubblewrap with
      #          NO network.
      #    The build NEVER hard-fails the job (we capture its exit code)
      #    so the audit `archive` job still runs for a non-compiling
      #    submission.
      # ───────────────────────────────────────────────────────────────
      - name: Strip git state before running untrusted Lean
        if: steps.encrypt.outcome == 'success'
        run: rm -rf .git lean-challenge/.git

      - name: Install elan
        if: steps.encrypt.outcome == 'success'
        run: |
          set -e
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -o /tmp/elan-init.sh
          sh /tmp/elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Wrap submission (gist mode)
        if: steps.encrypt.outcome == 'success' && steps.parse.outputs.mode == 'gist'
        run: |
          MODULE="${{ steps.parse.outputs.module }}"
          {
            echo "-- CI-generated wrapper for the submission."
            echo "import Challenges.${MODULE}"
            grep -E '^[[:space:]]*import[[:space:]]+' /tmp/submission.lean || true
            echo ""
            echo "namespace Submission"
            echo ""
            grep -v -E '^[[:space:]]*import[[:space:]]+' /tmp/submission.lean
            echo ""
            echo "end Submission"
          } > "lean-challenge/Challenges/Submission.lean"

      - name: Generate signature-shim Check.lean
        if: steps.encrypt.outcome == 'success'
        run: |
          SUBMODULE="Challenges.Submission"
          if [ "${{ steps.parse.outputs.mode }}" = "repo" ]; then
            SUBMODULE="Submission.Main"
          fi
          python3 scripts/generate_check.py \
            --problem "${{ steps.parse.outputs.problem_id }}" \
            --output "lean-challenge/Challenges/Check.lean" \
            --submission-module "$SUBMODULE"

      - name: Pre-build trusted environment (with network)
        if: steps.encrypt.outcome == 'success'
        working-directory: lean-challenge
        # Fetch the Mathlib cache and compile the canonical module the
        # submission imports — all TRUSTED code — WITH network. After this,
        # the untrusted compile below has every dependency locally and needs
        # no network, so it can run network-isolated. No untrusted submitter
        # code is elaborated here (the canonical module does not import
        # `Submission`).
        run: |
          set +e
          lake exe cache get || true
          lake build Challenges.${{ steps.parse.outputs.module }} || true

      - name: Install bubblewrap (build sandbox)
        if: steps.encrypt.outcome == 'success'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bubblewrap

      - name: Build the signature shim (network-isolated sandbox)
        id: build
        if: steps.encrypt.outcome == 'success'
        working-directory: lean-challenge
        # This is the ONLY step that elaborates untrusted submitter Lean
        # (Lean can run arbitrary code during elaboration). We run it under
        # bubblewrap with `--unshare-net`, so the build has NO network —
        # blocking crypto-mining, data exfiltration, and using the runner to
        # attack third parties. `--dev-bind / /` leaves the rest of the
        # filesystem as-is (lowest chance of breaking the build); secrets
        # were already removed (.git stripped, tokens step-scoped), and the
        # deps + canonical module were compiled above, so the offline
        # compile needs no network.
        #
        # If bubblewrap can't initialize a namespace on the runner, we fall
        # back to a non-isolated build with a warning rather than failing
        # every submission. The build's own exit code goes into `ok` (the
        # step never hard-fails) so the audit `archive` job still runs for a
        # non-compiling submission; `record` is gated on ok == 'true'.
        #
        # NOTE: untested from the author's machine (no Lean/Linux locally) —
        # confirm on a real CI run that bubblewrap is available and the
        # offline compile succeeds before relying on it. See SECURITY.md.
        run: |
          set +e
          if bwrap --unshare-net --dev-bind / / true 2>/dev/null; then
            echo "sandbox: bubblewrap network isolation engaged"
            bwrap --unshare-net --dev-bind / / --die-with-parent --chdir "$PWD" \
              bash -c 'lake build Challenges.Check'
            rc=$?
          else
            echo "::warning::bubblewrap could not initialize a sandbox on this runner; building WITHOUT network isolation"
            lake build Challenges.Check
            rc=$?
          fi
          if [ "$rc" -eq 0 ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      # ───────────────────────────────────────────────────────────────
      # 5. In-job rejection comments. NOTE: we deliberately do NOT echo
      #    the build log into the issue — on a public repo that would leak
      #    submission source. The submitter gets a generic reason + a link
      #    to the run; full logs are visible to maintainers.
      # ───────────────────────────────────────────────────────────────
      - name: Comment on evaluate-stage rejection
        # Fires for dup / fetch / size-cap / sorry / axiom / encryption
        # failures (all set FETCH_ERROR and exit non-zero). Build failures
        # are handled by the next step instead.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REASON="${FETCH_ERROR:-The submission could not be processed. See the workflow logs.}"
          gh issue comment ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --body "❌ Submission rejected: ${REASON}

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue close ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" --reason "not planned" || true

      - name: Comment on build failure
        if: steps.build.outputs.ok == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --body "❌ Submission rejected: \`lake build\` of the signature shim failed. Most commonly your theorem's type does not match the canonical \`${{ steps.parse.outputs.problem_id }}\` signature (substituting your \`Submission.r\` for \`r\`), or the proof depends on a non-permitted axiom.

          Full build logs (maintainer-visible): ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue close ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" --reason "not planned" || true

  # ─────────────────────────────────────────────────────────────────────
  # archive: push the age-encrypted source + sidecar to the PRIVATE audit
  # repo via the lean-challenge-archiver App. Fresh runner — the
  # write-capable token must never be co-resident with untrusted Lean.
  # Runs whenever the source was fetched, within cap, and encrypted —
  # even if the build later failed (we still archive what we evaluated).
  # ─────────────────────────────────────────────────────────────────────
  archive:
    needs: evaluate
    if: |
      always()
      && needs.evaluate.outputs.fetch_succeeded == 'true'
      && needs.evaluate.outputs.size_within_cap == 'true'
      && needs.evaluate.outputs.audit_ciphertext_ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          name: submission-audit-ciphertext
          path: /tmp/audit-in

      - name: Mint lean-challenge-archiver installation token
        id: archiver_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.LEAN_CHALLENGE_ARCHIVER_APP_ID }}
          private-key: ${{ secrets.LEAN_CHALLENGE_ARCHIVER_PRIVATE_KEY }}
          owner: utkuokur
          repositories: lean-challenges-audit

      - name: Push to lean-challenges-audit
        env:
          # Step-scoped, mirroring the bot-token pattern in `evaluate`.
          ARCHIVER_TOKEN: ${{ steps.archiver_token.outputs.token }}
        run: |
          set -euo pipefail
          if [ "${{ needs.evaluate.outputs.build_succeeded }}" = "true" ]; then
            VERDICT=pass
          else
            VERDICT=fail
          fi
          python3 scripts/archive_submission.py push \
            --ciphertext /tmp/audit-in/source.tar.gz.age \
            --sidecar /tmp/audit-in/sidecar.partial.json \
            --verdict "$VERDICT" \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ─────────────────────────────────────────────────────────────────────
  # record: append to the public leaderboard. Gated on `archive` so a
  # leaderboard entry always implies a durable encrypted archive of the
  # source. Only runs when the build passed.
  # ─────────────────────────────────────────────────────────────────────
  record:
    needs: [evaluate, archive]
    if: |
      always()
      && needs.evaluate.outputs.build_succeeded == 'true'
      && needs.archive.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        # Default token; this repo has no branch protection, so the
        # GITHUB_TOKEN push to main is sufficient (no recorder App needed).

      - uses: actions/download-artifact@v4
        with:
          name: submission-metadata
          path: /tmp/meta

      - name: Append to leaderboard and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          M=/tmp/meta/metadata.json
          NICK=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['nickname'])" "$M")
          NAME=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['name'])" "$M")
          PROBLEM=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['problem_id'])" "$M")
          CLAIM=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['claim'])" "$M")
          PARAM=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['parameter'])" "$M")
          PUBLIC=$(python3 -c "import json,sys;print(str(json.load(open(sys.argv[1]))['submission_public']).lower())" "$M")
          SRC=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1])).get('source_url') or '')" "$M")

          # Only publish the source link for PUBLIC submissions; private
          # ones land on the leaderboard with no recoverable source link.
          if [ "$PUBLIC" = "true" ]; then
            PUBLIC_FLAG="--submission-public"; SRC_ARG=(--source-url "$SRC")
          else
            PUBLIC_FLAG="--no-submission-public"; SRC_ARG=()
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git fetch origin main && git reset --hard origin/main
            python3 scripts/append_leaderboard.py \
              --leaderboard site-data/leaderboard.json \
              --nickname "$NICK" --name "$NAME" \
              --problem "$PROBLEM" --claim "$CLAIM" --parameter "$PARAM" \
              --issue "${{ github.event.issue.number }}" \
              $PUBLIC_FLAG "${SRC_ARG[@]}"
            git add site-data/leaderboard.json
            git commit -m "leaderboard: issue #${{ github.event.issue.number }}" || true
            if git push origin HEAD:main; then
              break
            fi
            echo "push attempt ${attempt} failed; retrying"
            sleep $((attempt * 2))
          done

      - name: Comment success and close
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          M=/tmp/meta/metadata.json
          PROBLEM=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['problem_id'])" "$M")
          MODULE=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['module'])" "$M")
          gh issue comment ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --body "✅ Build succeeded — added to the leaderboard.

          - Problem: \`${PROBLEM}\`
          - Module built: \`Challenges.${MODULE}\`
          - An encrypted copy of your submission was archived for audit; your source was not published."
          gh issue close ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" --reason completed

  # ─────────────────────────────────────────────────────────────────────
  # notify: surface INFRASTRUCTURE failures only — the build passed but
  # archive or record did not complete. Build failures and all evaluate-
  # stage rejections are already commented inside the evaluate job, so
  # this never double-comments them.
  # ─────────────────────────────────────────────────────────────────────
  notify:
    needs: [evaluate, archive, record]
    if: |
      always()
      && needs.evaluate.outputs.build_succeeded == 'true'
      && (needs.archive.result != 'success' || needs.record.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Comment on infrastructure failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCHIVE_RESULT: ${{ needs.archive.result }}
          RECORD_RESULT: ${{ needs.record.result }}
        run: |
          if [ "$ARCHIVE_RESULT" != "success" ]; then
            BODY="⚠️ Your proof compiled, but the audit-archive step did not complete (archive job: $ARCHIVE_RESULT), so the leaderboard was not updated. A maintainer will investigate. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            BODY="⚠️ Your proof compiled and was archived, but recording it to the leaderboard did not complete (record job: $RECORD_RESULT). A maintainer will investigate. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          gh issue comment ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" --body "$BODY"
