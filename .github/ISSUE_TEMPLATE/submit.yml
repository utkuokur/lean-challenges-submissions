name: Submit a proof
description: Submit a Lean 4 proof for a lean-challenges parametrized problem.
title: "[submission] "
labels:
  - submission
body:
  - type: markdown
    attributes:
      value: |
        Submit a Lean 4 proof for one of the parametrized challenges.

        Host your `challenge_NN.lean` file publicly (a GitHub repo or
        a public gist), then fill in the form below. The CI will fetch
        your file, run `lake build` against the pinned toolchain, and
        on success add your entry to the leaderboard.

  - type: input
    id: source_url
    attributes:
      label: Submission URL
      description: Public raw URL to your .lean file (GitHub or gist).
      placeholder: https://raw.githubusercontent.com/me/my-proofs/main/challenge_01.lean
    validations:
      required: true

  - type: dropdown
    id: problem_id
    attributes:
      label: Problem
      description: Which challenge are you targeting?
      options:
        - challenge_1
        - challenge_2
        - challenge_3
        - challenge_4
        - challenge_5
        - challenge_6
        - challenge_7
        - challenge_8
        - challenge_9
        - challenge_10
        - challenge_1_univ
        - challenge_3_univ
        - challenge_5_univ
        - challenge_7_univ
        - challenge_8_univ
        - challenge_9_univ
        - challenge_10_univ
    validations:
      required: true

  - type: dropdown
    id: claim
    attributes:
      label: Claim
      description: Are you proving or disproving?
      options:
        - prove
        - disprove
    validations:
      required: true

  - type: input
    id: parameter
    attributes:
      label: Chosen parameter r
      description: The r your proof establishes. For universal challenges, write "universal".
      placeholder: e.g. 5
    validations:
      required: true

  - type: input
    id: nickname
    attributes:
      label: Nickname
      description: Display name for the leaderboard.
      placeholder: lean_enjoyer
    validations:
      required: true

  - type: input
    id: full_name
    attributes:
      label: Full name (optional)
      description: Shown next to your nickname if provided.
    validations:
      required: false

  - type: textarea
    id: production_description
    attributes:
      label: How this proof was produced (optional)
      description: Brief notes on how the proof was produced.
    validations:
      required: false

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I understand the CI will fetch the URL above and run lake build against it.
          required: true
        - label: I understand my nickname, name, problem, claim, and parameter will be published on the public leaderboard.
          required: true
