name: Submit a proof of the universal conjecture
description: Settle one of the universal (∀r) challenges, either by proving or disproving it.
title: "[submission] "
labels:
  - submission
body:
  - type: markdown
    attributes:
      value: |
        Submit a proof (or counterexample) for the **universal** form of
        one of the challenges — the ∀r version that quantifies over all
        parameters. If you're settling a specific value of `r`, use the
        "Submit a proof for a specific r" form instead.

        Provide your proof as a **GitHub repository** containing a
        `Submission/Main.lean` (with the relevant `r` and
        `theorem challenge_N` inside `namespace Submission`), plus any
        helpers as `Submission/<Name>.lean`.

        New to submitting? See the [submission guide on the
        website](https://utkuokur.github.io/lean-challenges/#submit) for
        the expected repo layout and what the CI checks.

        **Keeping your proof private?** Use a **private** GitHub repo and
        install the `lean-challenge-bot` GitHub App on it — install link
        is in this repo's README — so the CI can clone it. Your source is
        never published: only your leaderboard row is.

  - type: input
    id: repo_url
    attributes:
      label: Repository URL
      description: HTTPS URL of your GitHub repo — public, or PRIVATE with the `lean-challenge-bot` App installed (see README). CI evaluates the `main` branch.
      placeholder: https://github.com/me/my-proofs
    validations:
      required: true

  - type: dropdown
    id: problem_id
    attributes:
      label: Problem
      description: Which challenge are you settling?
      options:
        - challenge_1
        - challenge_2
        - challenge_3
        - challenge_4
        - challenge_5
        - challenge_6
        - challenge_7
        - challenge_8
        - challenge_9
        - challenge_10
    validations:
      required: true

  - type: dropdown
    id: claim
    attributes:
      label: Claim
      description: Are you proving the universal conjecture, or disproving it (exhibiting a counterexample)?
      options:
        - prove
        - disprove
    validations:
      required: true

  - type: input
    id: nickname
    attributes:
      label: Nickname
      description: Display name for the leaderboard.
      placeholder: lean_enjoyer
    validations:
      required: true

  - type: input
    id: full_name
    attributes:
      label: Full name (optional)
      description: Shown next to your nickname if provided.
    validations:
      required: false

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I understand the CI will shallow-clone the repository above and run `lake build` against the canonical environment.
          required: true
        - label: I understand my nickname, name, problem, claim, and parameter will be published on the public leaderboard (but not my proof source).
          required: true
        - label: I understand that an encrypted copy of my submission source is retained indefinitely in a private audit repository, decryptable only by the maintainers listed in `.audit/recipients.txt`, for soundness auditing.
          required: true
