name: Submit a proof for a specific r
description: Submit a Lean 4 proof of one challenge at a specific value of the parameter r.
title: "[submission] "
labels:
  - submission
body:
  - type: markdown
    attributes:
      value: |
        Submit a proof of one of the parametrized challenges at a
        **specific** value of `r`. If you're settling the universal
        ∀r form, use the "Submit a proof of the universal conjecture"
        form instead.

        Provide your proof as a **GitHub repository** containing a
        `Submission/Main.lean` (with the relevant `r` and
        `theorem challenge_N` inside `namespace Submission`), plus any
        helpers as `Submission/<Name>.lean`.

        New to submitting? See the [submission guide on the
        website](https://utkuokur.github.io/lean-challenges/#submit) for
        the expected repo layout and what the CI checks.

        **Keeping your proof private?** Use a **private** GitHub repo and
        install the [`lean-challenge-bot` GitHub
        App](https://github.com/apps/lean-challenge-bot) on it so the CI
        can clone it. Your source is never published: only your
        leaderboard row is.

  - type: input
    id: repo_url
    attributes:
      label: Repository URL
      description: HTTPS URL of your GitHub repo — public, or PRIVATE with the [`lean-challenge-bot` App](https://github.com/apps/lean-challenge-bot) installed. CI evaluates the `main` branch.
      placeholder: https://github.com/me/my-proofs
    validations:
      required: true

  - type: dropdown
    id: problem_id
    attributes:
      label: Problem
      description: Which challenge are you targeting?
      options:
        - challenge_1
        - challenge_2
        - challenge_3
        - challenge_4
        - challenge_5
        - challenge_6
        - challenge_7
        - challenge_8
        - challenge_9
        - challenge_10
    validations:
      required: true

  - type: input
    id: parameter
    attributes:
      label: Chosen parameter r
      description: The value of `r` your proof establishes.
      placeholder: e.g. 5
    validations:
      required: true

  - type: input
    id: nickname
    attributes:
      label: Nickname
      description: Display name for the leaderboard.
      placeholder: lean_enjoyer
    validations:
      required: true

  - type: input
    id: full_name
    attributes:
      label: Full name (optional)
      description: Shown next to your nickname if provided.
    validations:
      required: false

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I understand the CI will shallow-clone the repository above and run `lake build` against the canonical environment.
          required: true
        - label: I understand my nickname, name, problem, claim, and parameter will be published on the public leaderboard (but not my proof source).
          required: true
        - label: I understand that an encrypted copy of my submission source is retained indefinitely in a private audit repository, decryptable only by the maintainers listed in `.audit/recipients.txt`, for soundness auditing.
          required: true
